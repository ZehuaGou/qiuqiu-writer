# qiuqiuwriter 统一部署：多镜像编排
# 所有中间件各用一个官方镜像，由 compose 统一启停
# 使用方式：
#   仅基础设施: docker compose up -d postgres redis mongodb
#   含可选服务: docker compose up -d postgres redis mongodb qdrant neo4j
#   含后端:     docker compose up -d

name: qiuqiuwriter

services:
  # ---------- 基础设施（应用依赖） ----------
  postgres:
    image: postgres:16-alpine
    container_name: qiuqiuwriter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-writerai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-writerai}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qiuqiuwriter_net

  redis:
    image: redis:7-alpine
    container_name: qiuqiuwriter-redis
    restart: unless-stopped
    # 若需密码，在 .env 中设置 REDIS_PASSWORD 并取消下一行注释，或使用 override
    # command: redis-server --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qiuqiuwriter_net

  mongodb:
    image: mongo:7
    container_name: qiuqiuwriter-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-writerai_sharedb}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qiuqiuwriter_net

  # ---------- 可选：向量库与图库 ----------
  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: qiuqiuwriter-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - qiuqiuwriter_net

  neo4j:
    image: neo4j:5.26.4
    container_name: qiuqiuwriter-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j123}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - qiuqiuwriter_net

  # ---------- 可选：后端应用（依赖上述服务） ----------
  backend:
    image: qiuqiuwriter-backend:latest
    container_name: qiuqiuwriter-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "uvicorn memos.api.ai_api:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - qiuqiuwriter_net

  # ---------- 前端与管理后台（Nginx 托管） ----------
  frontend:
    image: nginx:alpine
    container_name: qiuqiuwriter-frontend
    restart: unless-stopped
    ports:
      - "81:81"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - qiuqiuwriter_net

  admin:
    image: nginx:alpine
    container_name: qiuqiuwriter-admin
    restart: unless-stopped
    ports:
      - "8889:8889"
    volumes:
      - ../admin/dist:/usr/share/nginx/html:ro
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - qiuqiuwriter_net

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

networks:
  qiuqiuwriter_net:
    driver: bridge
