server {
    listen       8889;
    server_name  localhost;

    # 允许最大上传 50MB
    client_max_body_size 50m;

    # 管理后台静态资源（挂载到 /usr/share/nginx/html）
    root   /usr/share/nginx/html;
    index  index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
    }

    # 管理后台 SPA：非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
        # 避免 index.html 被缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API 代理到后端（Docker 网络中的 backend:8000）
    location /api/ {
        proxy_pass http://api.qiuqiuwriter.top:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
