server {
    listen       80;
    listen       [::]:80;
    server_name  qiuqiuwriter.top www.qiuqiuwriter.top localhost;
    resolver 223.5.5.5 223.6.6.6 114.114.114.114 [2001:4860:4860::8888] [2606:4700:4700::1111] ipv6=on valid=300s;
    set $api_upstream "api.qiuqiuwriter.top:8000";

    # 允许最大上传 50MB（导入章节/文件等）
    client_max_body_size 50m;

    # 前端静态资源（挂载到 /usr/share/nginx/html）
    # 注意：如果是在宿主机上直接运行，这里应该改成实际的前端打包路径，例如 /var/www/xingqiu_writer/frontend
    root   /var/www/xingqiu_writer/frontend;
    index  index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 静态资源缓存 (Vite 生成的带哈希文件名)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
    }

    # 前端 SPA：非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
        # 避免 index.html 被缓存，确保发布新版后用户能及时获取
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API 代理到远程后端
    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host api.qiuqiuwriter.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /ai/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host api.qiuqiuwriter.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /v1/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host api.qiuqiuwriter.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    # WebSocket（Yjs 等）
    location /api/v1/yjs {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.qiuqiuwriter.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    # WebSocket（多人协作 AI）
    location /api/v1/collab-ai {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.qiuqiuwriter.top;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }
}
