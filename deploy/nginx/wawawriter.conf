# wawawriter 站点配置
# 用法：见 deploy/nginx/README.md

server {
    listen       8888;             # IPv4 监听
    listen       [::]:8888;        # IPv6 监听（同时支持 IPv4 和 IPv6）
    server_name  localhost;  # 支持域名访问

    # 前端静态资源（先打包：cd frontend && npm run build）
    root   /Users/pang/Documents/wawawriter/frontend/dist;
    index  index.html;

    # 前端 SPA：非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端（与 Vite 开发代理一致）
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket（Yjs 等）
    location /api/v1/yjs {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
